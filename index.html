<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Victory Pizza LLC</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      background: #000;
      overflow: hidden;
    }

    video#bg-video {
      position: fixed;
      top: 50%; left: 50%;
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: -3;
      filter: brightness(1.15) contrast(1.1) saturate(1.25); /* Makes the video pop more epic/visible */
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 30, 0.12); /* Almost transparent now – max visibility for epic video */
      z-index: -2;
      pointer-events: none;
    }

    .content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 20px;
      max-width: 90%;
      z-index: 1;
    }

    h1 {
      font-size: 4.5rem;
      margin: 0.1em 0;
      letter-spacing: 3px;
      text-shadow: 
        0 0 20px #fff,
        0 0 40px #a0c4ff,
        0 0 80px #7da8ff,
        0 0 120px #5a8aff,
        0 0 160px #3a6eff; /* Intense cosmic glow for epic standout */
    }

    p {
      font-size: 2rem;
      margin: 0.4em 0;
      text-shadow: 
        0 0 15px #000,
        0 0 30px #000,
        0 0 60px rgba(100, 150, 255, 0.6);
    }

    @media (max-width: 768px) {
      h1 { font-size: 3.2rem; }
      p  { font-size: 1.6rem; }
    }

    /* Dark fallback if video fails */
    .fallback {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&q=80&w=3000') center / cover no-repeat;
      z-index: -4;
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline id="bg-video">
    <!-- Replace with your epic looping MP4 (upload to repo or use direct free link) -->
    <source src="https://cdn.pixabay.com/video/2020/10/22/53082-472531836_large.mp4" type="video/mp4">
    <!-- Or better epic one: find/download from Pixabay/Videezy and upload to /assets/ -->
    <!-- Example repo path: <source src="/assets/epic-galaxy-loop.mp4" type="video/mp4"> -->
    <div class="fallback"></div>
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>Victory Pizza LLC</h1>
    <p>Coming Q2 2027</p>
  </div>
</body>
</html>
