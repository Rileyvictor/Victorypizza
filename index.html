<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Victory Pizza LLC</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      background: #000;
      overflow: hidden;
    }

    /* Animated galaxy layers */
    .galaxy {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      overflow: hidden;
    }

    .stars, .stars2, .stars3 {
      position: absolute;
      top: 0; left: 0;
      right: 0; bottom: 0;
      width: 100%; height: 100%;
      background: transparent;
      pointer-events: none;
    }

    .stars {
      background: 
        radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 160px 120px, #ddd, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: twinkle 50s infinite linear, drift 120s infinite linear;
      opacity: 0.8;
    }

    .stars2 {
      background: 
        radial-gradient(1.5px 1.5px at 30px 60px, #fff, rgba(0,0,0,0)),
        radial-gradient(1.5px 1.5px at 80px 110px, #eee, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 110px 190px, #fff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 300px 300px;
      animation: twinkle 70s infinite linear, drift-slow 180s infinite linear reverse;
      opacity: 0.6;
    }

    .stars3 {
      background: 
        radial-gradient(3px 3px at 10px 10px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 200px 50px, #ddd, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 400px 400px;
      animation: twinkle 90s infinite linear;
      opacity: 0.4;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(-100px, -100px); }
    }

    @keyframes drift-slow {
      from { transform: translate(0, 0); }
      to { transform: translate(80px, 80px); }
    }

    /* Optional fallback static Milky Way if you prefer */
    .background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&q=80&w=3000') center center / cover no-repeat;
      z-index: -3;
      animation: subtle-zoom 60s infinite alternate ease-in-out;
    }

    @keyframes subtle-zoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 20, 0.25); /* Much lighter now â Milky Way shines through */
      z-index: -2;
    }

    .content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 20px;
      max-width: 90%;
      z-index: 1;
    }

    h1 {
      font-size: 3.8rem;
      margin: 0.2em 0;
      text-shadow: 0 0 30px rgba(200, 220, 255, 0.9), 0 0 60px rgba(100, 150, 255, 0.6);
    }

    p {
      font-size: 1.6rem;
      margin: 0.5em 0;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.7);
    }

    @media (max-width: 768px) {
      h1 { font-size: 2.8rem; }
      p  { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="galaxy">
    <div class="background"></div> <!-- static fallback -->
    <div class="stars3"></div>
    <div class="stars2"></div>
    <div class="stars"></div>
  </div>
  <div class="overlay"></div>
  <div class="content">
    <h1>Victory Pizza LLC</h1>
    <p>Coming Q2 2027</p>
  </div>
</body>
</html>
