<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Victory Pizza LLC</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      background: #000;
      overflow: hidden;
    }
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?auto=format&fit=crop&q=80&w=3000') center center / cover no-repeat;
      z-index: -2;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 20, 0.45); /* subtle dark overlay for better text readability */
      z-index: -1;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 20px;
      max-width: 90%;
    }
    h1 {
      font-size: 3.8rem;
      margin: 0.2em 0;
      text-shadow: 0 0 20px rgba(200, 220, 255, 0.9);
    }
    p {
      font-size: 1.6rem;
      margin: 0.5em 0;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
    }
    @media (max-width: 768px) {
      h1 { font-size: 2.8rem; }
      p  { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="overlay"></div>
  <div class="content">
    <h1>Victory Pizza LLC</h1>
    <p>Coming Q2 2027</p>
  </div>
</body>
</html>
